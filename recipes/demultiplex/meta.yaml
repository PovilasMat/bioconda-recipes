{% set name = "demultiplex" %}
{% set version = "1.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/demultiplex-{{ version }}.tar.gz
  sha256: 905e70a3674aab01c63f6e130ce8b4c9dca54cc0868b932587d4a1045d945990

build:
  entry_points:
    - demultiplex = demultiplex.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  run_exports:
    - {{ pin_subpackage(name|lower) }}

requirements:
  host:
    - python >=3.6
    - pip
    - poetry
  run:
    - python >=3.6
    - biopython >=1.72
    - dict-trie >=1.0.1
    - fastools >=1.1.0
    - jit-open >=1.0.1
    - tssv >=1.1.0
    - poetry

test:
  imports:
    - demultiplex
  commands:
    - pip check
    - demultiplex --help
  requires:
    - pip

about:
  home: https://github.com/jfjlaros/demultiplex
  doc_url: https://demultiplex.readthedocs.io/en/latest/index.html
  summary: Demultiplex any number of FASTA or a FASTQ files based on a list of barcodes
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - acaprez
