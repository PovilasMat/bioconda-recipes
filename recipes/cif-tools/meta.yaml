{% set name = "cif-tools" %}
{% set version = "2.0.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/PDB-REDO/{{ name|lower }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 23ee68083e13d58501192e486d431f2425c4e71cabe74bb164e098559b014c5a

build:
  number: 0
  run_exports: []

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
    - pkg-config
    - sed  # [osx]
  host:
    - fast_float
    - libcifpp ==9.0.5
    - libmcfp ==1.4.2
    - zlib

test:
  commands:
    - pdb2cif --help
    - cif2pdb --help || true
    - cif-diff --help
    - cif-grep --help
    - cif-merge --help
    - cif-validate --help
    - mmCQL --help
  files:
    - test.cql
  source_files:
    - 443d_final.cif
    - 7f95-carb.cif
    - 7f95-carb.pdb
    - 7f95_flipper.pdb

about:
  home: https://github.com/PDB-REDO/cif-tools
  dev_url: https://github.com/PDB-REDO/cif-tools
  doc_url: https://github.com/PDB-REDO/cif-tools/tree/v{{ version }}/doc
  summary: "A suite of programs to manipulate and examine mmCIF files"
  license: 'BSD-2-Clause "Simplified"'
  license_family: BSD
  license_file: LICENSE
  description: |
    The cif-tools suite of programs are tools you can use to examine and manipulate mmCIF and PDB files.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - eunos-1128
