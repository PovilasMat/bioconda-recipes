{% set name = "impg" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/pangenome/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 6c8c0333419cd3129e69a72450894164eaf907187cd627f3d20eb57eb2bded6d 

build:
  number: 0
  run_exports:
      - {{ pin_subpackage(name, max_pin="x.x") }}
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - gfortran_osx-arm64  # [osx and arm64]
    - gfortran_osx-64     # [osx and x86_64]
    - make
    - cmake
    - cargo-bundle-licenses
    - pkg-config
    - libclang
  host:
    - zlib
    - libclang

test:
  commands:
    - impg --help

about:
  home: "https://github.com/pangenome/{{ name }}"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "impg: implicit pangenome graphs."
  dev_url: "https://github.com/pangenome/{{ name }}"
  doc_url: "https://github.com/pangenome/impg/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - AndreaGuarracino
