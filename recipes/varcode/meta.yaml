{% set name = "varcode" %}
{% set version = "5.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a98aefeeffcf9d26927e24a7863ebcf83532d4b569b349e9d53f266a9cd18e30

build:
  number: 0
  noarch: python
  entry_points:
    - varcode-genes = varcode.cli.genes_script:main
    - varcode = varcode.cli.effects_script:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools <82
  run:
    - python >=3.9
    - setuptools <82
    - biopython >=1.64
    - memoized-property >=1.0.2
    - numpy >=2.0.0,<3
    - pandas >=2.0.0,<3
    - pyensembl >=2.6.2
    - pyvcf3 >=1.0.0
    - sercol >=0.1.4
    - serializable >=0.2.1

test:
  imports:
    - test
    - varcode
    - varcode.cli
    - varcode.effects
  commands:
    - varcode-genes --help
    - varcode --help

about:
  home: "https://github.com/openvax/varcode"
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  summary: "Variant annotation in Python."
  dev_url: "https://github.com/openvax/varcode"
  doc_url: "https://github.com/openvax/varcode/blob/main/README.md"

extra:
  recipe-maintainers:
    - jonasscheid
