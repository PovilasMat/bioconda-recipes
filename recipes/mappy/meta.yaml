{% set name = "mappy" %}
{% set version = "2.31" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/mappy-{{ version }}.tar.gz
  sha256: 152a358c11cba1f992968e2611f1e0a1f4a87aaaa3602d93e4f59d7c1db8f3b2

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('mappy', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - cython
    - pip
    - zlib
  run:
    - python

test:
  imports:
    - mappy

about:
  home: https://github.com/lh3/minimap2
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: 'Minimap2 Python binding'

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
