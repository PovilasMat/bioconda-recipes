{% set version = "1.6.1" %}

package:
  name: piranha-polio
  version: {{ version }}

source:
  url: https://github.com/polio-nanopore/piranha/archive/refs/tags/{{ version }}.tar.gz
  sha256: 598a98ff1f67d7b15854641c336b97eb483953009ca505006e34ea4256a7a175

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vvv
  run_exports:
    - {{ pin_subpackage("piranha-polio", max_pin="x") }}

requirements:
  host:
    - python >=3.12,<4
    - pip
    - setuptools
  run:
    - python >=3.12,<4
    # From upstream pyproject.toml
    - mako =1.2
    - pandas
    - snipit
    - numpy
    - scipy
    # From upstream environment.yml
    - biopython
    - bcftools =1.23
    - coreutils =9.5
    - flopp =0.2.0
    - freebayes =1.3.6
    - iqtree >=3.0
    - jclusterfunk >=0.0.25
    - mafft
    - medaka =2.2.0
    - minimap2 >=2.16
    - rasusa =0.7.1
    - samtools =1.2.0
    - snakemake-minimal =9.13.7
    - tabix >=1.11
    - pysam
test:
  commands:
    - piranha --help
    - piranha --version

about:
  home: https://github.com/polio-nanopore/piranha
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Poliovirus Investigation Resource Automating Nanopore Haplotype Analysis
