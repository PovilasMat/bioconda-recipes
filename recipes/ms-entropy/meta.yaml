{% set name = "ms-entropy" %}
{% set version = "1.5.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ms_entropy-{{ version }}.tar.gz
  sha256: 728a2136d7b13320e1c0348eefde1d7331f61c60e0ba32583abffdc3ed5c2394
  patches:
    - 0001-setup.py.patch  # [osx]

build:
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  number: 0
  skip: True  # [py < 37]
  run_exports:
    - {{ pin_subpackage('ms-entropy', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - clangdev  # [osx]
  host:
    - python
    - setuptools
    - cython
    - numpy
    - pip
  run:
    - python
    - numpy

test:
  imports:
    - ms_entropy

about:
  home: "https://github.com/YuanyueLi/MSEntropy"
  summary: "This package provides a Python implementation of calculating spectral entropy, entropy similarity, and Flash entropy search for mass spectrometry data."
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  dev_url: "https://github.com/YuanyueLi/MSEntropy"
  doc_url: "https://msentropy.readthedocs.io/en/latest"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - hechth
  identifiers:
    - doi:10.1038/s41592-023-02012-9
    - doi:10.1038/s41592-021-01331-z
