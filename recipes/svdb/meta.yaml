{% set version = "2.11.1" %}
{% set sha256 = "059f96fd662150d42b687cf79f15773d66e349aabaaa82ced094c19fedec7977" %}

package:
  name: svdb
  version: {{ version }}

source:
  url: https://github.com/J35P312/SVDB/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
  run_exports:
    - {{ pin_subpackage('svdb', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - numpy
    - cython
    - setuptools
    - rapidfuzz
  run:
    - python
    - numpy
    - rapidfuzz

test:
  commands:
    - svdb --help

about:
  home: "https://github.com/J35P312/SVDB"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Structural variant database software."
  dev_url: "https://github.com/J35P312/SVDB"
  doc_url: "https://github.com/J35P312/SVDB/blob/{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
