{% set name = "perl-minion-backend-sqlite" %}
{% set version = "6.0.0" %}
{% set sha256 = "67df902fa011a4eeaf3a1c7a7b3549065ecf1d1b2c65fdd67fe649ba827c3329" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/Grinnz/Minion-Backend-SQLite/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    weak:
      - {{ name }} ={{ version }}
  noarch: generic

requirements:
  host:
    - perl =>5.32
    - perl-module-build-tiny
    - perl-mojo-sqlite
    - perl-minion
    - perl-mojolicious
    - perl-dbi
    - perl-dbd-sqlite
    - make

  run:
    - perl =>5.32
    - perl-dbi
    - perl-dbd-sqlite
    - perl-mojolicious
    - perl-minion
    - perl-mojo-sqlite

test:
  imports:
    - Minion::Backend::SQLite


about:
  home: https://github.com/Grinnz/Minion-Backend-SQLite
  license: Artistic-2.0
  summary: 'SQLite backend for Minion job queue'

extra:
  recipe-maintainers:
    - khaled196
