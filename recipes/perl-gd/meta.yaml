{% set name = "perl-gd" %}
{% set version = "2.86" %}
{% set sha256 = "6d64d3be1429cc1eb4e88a8f2022fec910ea3e0792da4fe58d3edf7695c46ca2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/R/RU/RURBAN/GD-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - pkg-config
    - {{ stdlib('c') }}
  host:
    - perl
    - perl-extutils-makemaker
    - perl-extutils-pkgconfig
    - perl-test-fork
    - perl-test-nowarnings
    - perl-extutils-constant
    - perl-file-which
    - libgd
    - zlib
    - expat
  run:
    - libgd
    - perl
    - zlib

test:
  imports:
    - GD
    - GD::Simple

about:
  home: http://metacpan.org/pod/GD
  license: perl_5
  summary: 'Perl interface to the gd2 graphics library'

extra:
  additional-platforms:
    - linux-aarch64
