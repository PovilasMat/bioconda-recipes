{% set name = "jaeger-bio" %}
{% set version = "1.26.3" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/jaeger_bio-{{ version }}.tar.gz"
  sha256: 4cd0bdf87f4f52731d46508d7cd4852dd9dc6b2eab1e75dd14ed423dab333a07

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('jaeger-bio', max_pin="x") }}
  noarch: python

requirements:
  host:
    - python >=3.9,<3.12
    - pip
    - pdm-backend
  run:
    - h5py >=3.8
    - keras >=3.12.0,<4
    - kneed >=0.8.5
    - matplotlib-base >=3.7
    - numpy >=1.24
    - pandas >=1.5
    - progressbar2 >=4.4.2
    - psutil >=5
    - pycirclize
    - pyfastx >=2
    - python >=3.9,<3.12
    - ruptures >=1.1.9
    - scikit-learn ==1.3.2
    - parasail-python >=1.3.4
    - tensorflow >=2.15
    - pydustmasker >=1.0.3,<2

test:
  imports:
    - jaeger
    - jaeger.data
    - jaeger.nnlib
  commands:
    - jaeger --help
    - jaeger run --help

about:
  home: "https://github.com/Yasas1994/Jaeger"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A quick and precise pipeline for detecting phages in sequence assemblies."
  dev_url: https://github.com/Yasas1994/Jaeger
  doc_url: https://readthedocs.org/projects/jaeger-docs/

extra:
  recipe-maintainers:
    - Yasas1994
