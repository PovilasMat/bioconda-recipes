{% set name = "tssv" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tssv-{{ version }}.tar.gz
  sha256: e37e35c18469c4a96dabb973392b87cc0d6a0c31a56d033ab62795877c110a9e
  patches: tssv-sources.patch

build:
  number: 0
  skip: True  # [osx]
  script:
    - export CFLAGS="${CFLAGS} -DNO_SSE -O3 -Xlinker -zmuldefs"
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
  entry_points:
    - tssv = tssv.cli:main
    - tannotate = tssv_extras.annotate:main
  run_exports: 
    - {{ pin_subpackage('tssv', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - pip
    - setuptools
    - python
  run:
    - biopython >=1.72
    - python
    - requests
    - xopen
    - setuptools

test:
  commands:
    - tssv -h

about:
  home: "https://github.com/jfjlaros/tssv"
  license: MIT
  license_family: MIT
  summary: "Targeted characterisation of short structural variation."
  doc_url: "https://tssv.readthedocs.io/en/latest"
  dev_url: "https://github.com/jfjlaros/tssv"

extra:
  recipe-maintainers:
    - Redmar-van-den-Berg
  additional-platforms:
    - linux-aarch64
